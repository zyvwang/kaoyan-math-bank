name: Build Release Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-latex:
    name: Linux TeX export verification
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-xetex texlive-lang-chinese texlive-pictures

      - name: Install dependencies
        run: npm ci

      - name: Verify real LaTeX exports
        run: |
          npm run build
          KMB_WORKSPACE_DIR=.tmp/release-tex-workspace npx tsx scripts/verify-export.ts

  build-windows:
    name: Windows NSIS
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

      - name: Run desktop smoke test
        run: npm run test:desktop

      - name: Build Windows installer
        run: npx electron-builder --win nsis --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

      - name: Run desktop smoke test
        run: npm run test:desktop

      - name: Build macOS DMG
        run: npx electron-builder --mac dmg --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            release/*.dmg
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - verify-latex
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" artifacts/**/* --repo "$REPO" --clobber
          else
            gh release create "$TAG_NAME" artifacts/**/* --repo "$REPO" --draft --generate-notes --title "$TAG_NAME"
          fi
